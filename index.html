<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just2minutes | Daily Mishnayos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
        .read-more-btn { color: #2563eb; font-weight: 600; cursor: pointer; }
        .hidden-content { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <img src="./resources/logo.png" alt="Just2minutes Logo" class="h-10">
            <ul class="hidden md:flex gap-6 font-medium text-slate-600">
                <li><a href="#home" class="hover:text-blue-600">Home</a></li>
                <li><a href="./gallery/" class="hover:text-blue-600">Gallery</a></li>
                <li><a href="#about" class="hover:text-blue-600">About</a></li>
                <li><a href="https://chat.whatsapp.com/JDERP6vZjZkIYN8SGXOj6W" target="_blank" class="hover:text-green-600">WhatsApp</a></li>
                <li><a href="mailto:just2minutesjust2mishnayos@gmail.com" class="hover:text-blue-600">Email</a></li>
            </ul>
        </nav>
    </header>

    <main id="home" class="max-w-4xl mx-auto px-6 py-10">
        <div id="hero-section" class="bg-white rounded-2xl shadow-lg p-6 mb-12">
            <h1 id="hero-title" class="text-2xl font-bold mb-2">Loading latest class...</h1>
            <p id="hero-date" class="text-slate-500 mb-4 text-sm"></p>
            <div id="hero-player" class="w-full aspect-video bg-black rounded-xl overflow-hidden mb-4"></div>
            <div id="hero-desc" class="text-slate-700 leading-relaxed"></div>
        </div>

        <div class="text-center mb-8">
            <button onclick="toggleLibrary()" id="toggle-btn" class="bg-blue-600 text-white px-8 py-3 rounded-full font-semibold shadow-md hover:bg-blue-700 transition">
                Load Previous Classes
            </button>
        </div>

        <section id="library" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>

        <section id="about" class="mt-20 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-3xl font-bold mb-6">About Just2minutes</h2>
            <p class="text-slate-600 leading-relaxed">Join us for daily Mishnayos classes that fit right into your busy schedule. Consistency is key, and just two minutes a day can make a massive difference in your learning journey.</p>
        </section>
    </main>

    <script>
        const CHANNEL_ID = 'UCesehqhgaJRI_NLsDCn3TRQ';
        let allVideos = [];

        async function fetchVideos() {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`);
                const data = await response.json();
                allVideos = data.items;
                
                const urlParams = new URLSearchParams(window.location.search);
                const vidId = urlParams.get('video-id');
                const target = vidId ? allVideos.find(v => v.link.includes(vidId)) : allVideos[0];
                
                renderHero(target || allVideos[0]);
                renderLibrary();
            } catch (e) {
                console.error("Error loading videos", e);
            }
        }

        function renderHero(video) {
            const videoId = video.link.split('v=')[1];
            document.getElementById('hero-title').textContent = video.title;
            document.getElementById('hero-date').textContent = new Date(video.pubDate).toLocaleDateString();
            document.getElementById('hero-player').innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            
            const desc = video.description || "No description available.";
            document.getElementById('hero-desc').innerHTML = desc.length > 200 
                ? `${desc.substring(0, 200)}... <span class="read-more-btn" onclick="this.parentElement.innerHTML='${desc.replace(/'/g, "\\'")}'">Read more</span>` 
                : desc;
        }

        function renderLibrary() {
            const lib = document.getElementById('library');
            lib.innerHTML = allVideos.map(item => {
                const id = item.link.split('v=')[1];
                return `
                    <div class="card bg-white rounded-xl shadow-sm border p-4 cursor-pointer" onclick="window.location.search='?video-id=${id}'; window.scrollTo({top:0, behavior:'smooth'})">
                        <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" class="w-full aspect-video rounded-lg mb-3 object-cover">
                        <h3 class="font-bold text-sm line-clamp-2">${item.title}</h3>
                        <p class="text-xs text-slate-400 mt-2">${new Date(item.pubDate).toLocaleDateString()}</p>
                    </div>`;
            }).join('');
        }

        function toggleLibrary() {
            const lib = document.getElementById('library');
            const btn = document.getElementById('toggle-btn');
            lib.classList.toggle('hidden');
            btn.textContent = lib.classList.contains('hidden') ? 'Load Previous Classes' : 'Hide Library';
        }

        window.onload = fetchVideos;
    </script>
</body>
</html>
